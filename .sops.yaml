# SOPS rules for cluster (GitOps) secrets.
# Cluster manifests under kubernetes/ are encrypted to:
#   - the dedicated cluster age key (Flux kustomize-controller decrypts at reconcile)
#   - the operator (joe-mac) age key (so secrets can be authored/rotated from the Mac)
# The host-bundle secrets in the home-infra repo keep their own .sops.yaml untouched.
creation_rules:
  - path_regex: kubernetes/.*\.sops\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    age: >-
      age1s6p4fr0zhx3azja49lvfdgxv2093af6xnrq3kjjw22tk5h7rputq7fdsvj,
      age1rj5crn092ny5fatzt05su4z7qthx5n33npuc0jhzed8umwngfdgssds32a
