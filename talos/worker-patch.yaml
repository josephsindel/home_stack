# Worker machine-config patch. Applied live to home-worker-1 (.27) on 2026-06-18:
#   talosctl -e 192.168.86.25 -n 192.168.86.27 patch mc --patch @talos/worker-patch.yaml
# Mirrors the kubelet.extraMounts in cp-patch.yaml so local-path-provisioner can
# create PV directories on the worker (Talos exposes /var subpaths read-only to
# the kubelet without an explicit extraMount).
machine:
  kubelet:
    extraMounts:
      - destination: /var/local-path-provisioner
        type: bind
        source: /var/local-path-provisioner
        options:
          - bind
          - rshared
          - rw
