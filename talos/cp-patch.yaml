machine:
  install:
    disk: /dev/nvme0n1
  network:
    nameservers:
      - 1.1.1.1
    interfaces:
      - deviceSelector:
          hardwareAddr: "38:05:25:37:a1:67"
        dhcp: false
        addresses:
          - 192.168.86.26/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.86.1
        vip:
          ip: 192.168.86.25
cluster:
  allowSchedulingOnControlPlanes: true
  network:
    cni:
      name: none
  proxy:
    disabled: true
