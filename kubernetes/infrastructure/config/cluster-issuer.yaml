# Internal CA for cluster TLS (homelab). Public ACME (Let's Encrypt DNS-01) or the
# Tailscale cert path can be added later as additional ClusterIssuers.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-internal-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: home-internal-ca
  secretName: home-internal-ca-tls
  duration: 87600h   # 10 years
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca
spec:
  ca:
    secretName: home-internal-ca-tls
