apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: csi-driver-nfs
  namespace: flux-system
spec:
  interval: 24h
  url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: csi-driver-nfs
      version: "v4.13.3"
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
        namespace: flux-system
  values:
    externalSnapshotter:
      enabled: false
---
# Bulk media / backups → Synology NFS. NOT for databases (NFS locking corrupts
# Redis AOF / MySQL — keep DB volumes on node-local storage). Server is the static
# IP, not the hostname: Talos nodes resolve via 1.1.1.1 and can't see *.home.arpa.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-synology
provisioner: nfs.csi.k8s.io
parameters:
  server: "192.168.86.12"
  share: /volume1/NetBackup
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
mountOptions:
  - nfsvers=4.1
  - nconnect=4
  - noatime
  - hard
