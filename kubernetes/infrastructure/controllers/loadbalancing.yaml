# Cilium LB-IPAM pool + L2 (ARP) announcement for LoadBalancer services on the
# Trusted LAN. Requires Cilium l2announcements.enabled=true (set via cilium/install.sh
# helm upgrade). LB-IPAM itself is already enabled on the running Cilium.
#
# IMPORTANT: the Trusted (.86) DHCP range is .6-.254, so this LB block MUST be
# carved OUT of UniFi DHCP or the gateway/clients will lease + ARP-stomp these IPs.
# Action: set the Trusted network DHCP range end to .244 (i.e. .6-.244), leaving
# .245-.254 exclusively for the cluster LoadBalancer pool.
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: home-lan-pool
spec:
  blocks:
    - start: "192.168.86.245"
      stop: "192.168.86.254"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: home-lan-l2
spec:
  # Announce LoadBalancer IPs via ARP. No interface selector → Cilium answers on
  # the node's native devices (avoids guessing the MS-01 NIC name, which is not
  # stable across boots on this hardware).
  loadBalancerIPs: true
  externalIPs: false
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
