apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  maxHistory: 3
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  values:
    # Flux plugin is copied in fresh on every pod start by the initContainer,
    # so an emptyDir is enough — no PVC (avoids NFS root-squash chown + no default SC).
    config:
      pluginsDir: /build/plugins
      # Keep browser sessions valid for a week. The chart renders larger
      # integers in scientific notation, which Headlamp's int parser rejects.
      # The login token itself comes from the in-cluster service account below,
      # so you should not need a freshly generated token every time you open Headlamp.
      sessionTTL: 604800
      # Homelab-only tradeoff: the LoadBalancer is on the trusted LAN and this
      # avoids the repeated token-login flow. Do not expose Headlamp publicly
      # with this enabled.
      unsafeUseServiceAccountToken: true
    initContainers:
      - name: headlamp-plugins
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:latest
        imagePullPolicy: Always
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build
        securityContext:
          runAsNonRoot: false
          privileged: false
          runAsUser: 0
          runAsGroup: 0
        volumeMounts:
          - mountPath: /build/plugins
            name: headlamp-plugins
    volumeMounts:
      - mountPath: /build/plugins
        name: headlamp-plugins
    volumes:
      - name: headlamp-plugins
        emptyDir: {}
    # Pinned to .245 (the IP LB-IPAM had auto-assigned) so the pool is fully
    # deterministic — every LoadBalancer service in this repo pins its IP, which
    # avoids float/collision when the .245-.254 pool is full.
    service:
      type: LoadBalancer
      annotations:
        lbipam.cilium.io/ips: "192.168.86.245"
      port: 80
