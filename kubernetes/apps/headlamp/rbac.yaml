# Homelab: bind Headlamp's chart-created ServiceAccount to cluster-admin.
# The HelmRelease enables unsafe service-account-token auth for this LAN-only lab,
# so Headlamp uses this account for UI access without repeated token prompts.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp
    namespace: headlamp
