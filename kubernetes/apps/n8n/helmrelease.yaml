apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      n8n:
        containers:
          app:
            image:
              repository: docker.n8n.io/n8nio/n8n
              tag: "2.17.8"
            env:
              N8N_HOST: "192.168.86.247"
              N8N_PORT: "5678"
              N8N_PROTOCOL: http
              N8N_SECURE_COOKIE: "false"        # plain http on LAN IP
              WEBHOOK_URL: http://192.168.86.247/
              GENERIC_TIMEZONE: America/Los_Angeles
              N8N_ENCRYPTION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: n8n-secret
                    key: N8N_ENCRYPTION_KEY
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: 5678 }
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: 5678 }
                  initialDelaySeconds: 10
                  periodSeconds: 10
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
    service:
      app:
        controller: n8n
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.86.247"
        ports:
          http:
            port: 80
            targetPort: 5678
    persistence:
      data:
        enabled: true
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /home/node/.n8n
