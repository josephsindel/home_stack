apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homepage
resources:
  - namespace.yaml
  - secret.sops.yaml
  - helmrelease.yaml
  - ingress.yaml
# Homepage config files -> ConfigMap. Stable name (no hash suffix) so the
# HelmRelease can reference it; homepage hot-reloads on file change.
configMapGenerator:
  - name: homepage-config
    files:
      - config/settings.yaml
      - config/services.yaml
      - config/widgets.yaml
      - config/bookmarks.yaml
      - config/docker.yaml
      - config/kubernetes.yaml
      - config/proxmox.yaml
      - config/custom.css
      - config/custom.js
generatorOptions:
  disableNameSuffixHash: true
