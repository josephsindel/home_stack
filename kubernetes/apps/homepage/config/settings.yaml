title: home-infra
favicon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/kubernetes.png
theme: dark
color: slate
headerStyle: clean
statusStyle: dot
# Groups are organized by FUNCTION (not by host). Keys must match services.yaml.
layout:
  Media:
    style: row
    columns: 5
    header: true
    icon: mdi-multimedia
  AI & LLM:
    style: row
    columns: 5
    header: true
    icon: mdi-robot
  Apps & Knowledge:
    style: row
    columns: 3
    header: true
    icon: mdi-apps
  Smart Home:
    style: row
    columns: 2
    header: true
    icon: mdi-home-automation
  Platform & Monitoring:
    style: row
    columns: 5
    header: true
    icon: mdi-server-network
  Network:
    style: row
    columns: 3
    header: true
    icon: mdi-lan
  Storage:
    style: row
    columns: 3
    header: true
    icon: mdi-nas
  SSH:
    style: row
    columns: 4
    header: true
    icon: mdi-console
quicklaunch:
  searchDescriptions: true
  hideInternetSearch: true
