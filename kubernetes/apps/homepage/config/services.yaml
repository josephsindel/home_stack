# Homepage runs IN the k8s cluster (homepage namespace, LB 192.168.86.235).
# Organized BY FUNCTION (not by host) since almost everything is now in k8s.
# Link conventions:
#   - href:        opened by the USER'S BROWSER -> Tailscale (*.ts.net / 100.x) / LB IPs are fine.
#   - widget url + siteMonitor: fetched SERVER-SIDE by the homepage POD (no Tailscale) ->
#       in-cluster -> k8s DNS (svc.namespace); LAN hosts -> LAN IPs (.10 ms / .11 thor / .12 nas / .13 pi).
#   - API keys come from the SOPS secret via {{HOMEPAGE_VAR_*}} (repo is public).

