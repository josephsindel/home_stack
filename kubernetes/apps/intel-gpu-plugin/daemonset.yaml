# Intel GPU device plugin — vendored from
# intel/intel-device-plugins-for-kubernetes v0.36.0 (deployments/gpu_plugin/base).
# Vendored (not a remote kustomize base) because Flux kustomize-controller
# disallows remote bases. Local modifications vs upstream:
#   * namespace: kube-system
#   * args: -shared-dev-num=4  (advertise the single iGPU as 4 shareable units so
#     Tdarr + future transcode pods can share it; Plex-style loads don't saturate)
#   * nodeSelector pinned to home-worker-1 — ONLY that node has the i915 extension
#     + /dev/dri (control plane was not upgraded), so the plugin must not run there.
# Advertises gpu.intel.com/i915 on the node. See [[media-transcode-hw]] / home-infra.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: kube-system
  labels:
    app: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-plugin
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: intel-gpu-plugin
    spec:
      containers:
      - name: intel-gpu-plugin
        args:
          - -shared-dev-num=4
        env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: HOST_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
        image: intel/intel-gpu-plugin:0.36.0
        imagePullPolicy: IfNotPresent
        securityContext:
          seLinuxOptions:
            type: "container_device_plugin_t"
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "45Mi"
            cpu: 40m
          limits:
            memory: "90Mi"
            cpu: 100m
        volumeMounts:
        - name: devfs
          mountPath: /dev/dri
          readOnly: true
        - name: sysfsdrm
          mountPath: /sys/class/drm
          readOnly: true
        - name: kubeletsockets
          mountPath: /var/lib/kubelet/device-plugins
        - name: cdipath
          mountPath: /var/run/cdi
      volumes:
      - name: devfs
        hostPath:
          path: /dev/dri
      - name: sysfsdrm
        hostPath:
          path: /sys/class/drm
      - name: kubeletsockets
        hostPath:
          path: /var/lib/kubelet/device-plugins
      - name: cdipath
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/arch: amd64
        kubernetes.io/hostname: home-worker-1
