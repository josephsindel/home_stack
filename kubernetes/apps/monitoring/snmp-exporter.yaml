# snmp_exporter — translates SNMP from the Synology NAS into Prometheus metrics.
# The image already bundles a snmp.yml with the `synology`, `if_mib`, `ucd_*` and
# `hrStorage`/`hrSystem` modules, so we keep that as-is and only layer in a tiny
# auth overlay (the `homelab` community) via a SOPS secret as a SECOND
# --config.file (snmp_exporter merges multiple config files).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snmp-exporter
  namespace: monitoring
spec:
  interval: 1h
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  chart:
    spec:
      chart: prometheus-snmp-exporter
      version: "9.14.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    fullnameOverride: snmp-exporter   # stable Service name → snmp-exporter:9116
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 50Mi
      limits:
        memory: 256Mi
    service:
      type: ClusterIP
      port: 9116
    # We scrape it via a VMScrapeConfig, not the prometheus-operator ServiceMonitor.
    serviceMonitor:
      enabled: false
    # Mount the SOPS auth overlay (auths: synology_v2 community=homelab).
    extraSecretMounts:
      - name: snmp-auth
        mountPath: /etc/snmp-auth
        secretName: snmp-auth
        readOnly: true
        defaultMode: 420
    # Bundled modules + our auth overlay. snmp_exporter merges both files.
    extraArgs:
      - "--config.file=/etc/snmp_exporter/snmp.yml"
      - "--config.file=/etc/snmp-auth/auth.yml"
