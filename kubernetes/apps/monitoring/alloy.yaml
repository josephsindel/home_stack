# Grafana Alloy — log shipper DaemonSet (the Promtail successor; Promtail is EOL
# as of March 2026). Collects pod logs via the Kubernetes API (no privileged
# hostPath mounts — Talos-friendly) and forwards them to VictoriaLogs over its
# Loki-compatible push endpoint.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 1h
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  chart:
    spec:
      chart: alloy
      version: "1.10.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    controller:
      type: daemonset
    # The chart's ClusterRole is EMPTY by default — API-based log collection
    # (discovery.kubernetes + loki.source.kubernetes) needs pods + pods/log, so
    # the rules must be supplied explicitly or collection silently gets nothing.
    rbac:
      create: true
      clusterRules:
        - apiGroups: [""]
          resources: ["nodes", "nodes/proxy", "pods", "pods/log", "endpoints", "services"]
          verbs: ["get", "list", "watch"]
    alloy:
      # API-based log collection needs no host mounts or privileged context.
      mounts:
        varlog: false
        dockercontainers: false
      configMap:
        create: true
        content: |-
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Promote useful metadata to log stream labels.
          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.write.victorialogs.receiver]
          }

          loki.write "victorialogs" {
            endpoint {
              // _msg_field tells VictoriaLogs which parsed field holds the message
              // for JSON logs (Go controllers use "msg", some apps use "message");
              // _msg is the fallback for plain-text lines. Without this, JSON logs
              // show "missing _msg field" instead of the actual message.
              url = "http://victorialogs.monitoring.svc:9428/insert/loki/api/v1/push?_msg_field=msg,message,_msg"
            }
            external_labels = {
              cluster = "home",
            }
          }
