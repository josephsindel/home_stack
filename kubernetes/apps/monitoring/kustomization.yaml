apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - repository.yaml
  - secret-monitoring.sops.yaml
  - vm-k8s-stack.yaml
  - victoria-logs.yaml
  - alloy.yaml
  - snmp-exporter.yaml
  - secret-snmp.sops.yaml
  - vmscrapeconfig-synology.yaml
  - vmstaticscrape-thor.yaml

# dotdc Kubernetes overview dashboards, delivered as a ConfigMap the Grafana
# sidecar auto-loads (label grafana_dashboard: "1", folder via grafana_folder).
# Egress-free — JSON is vendored in dashboards/ rather than pulled at pod start.
configMapGenerator:
  - name: dotdc-dashboards
    namespace: monitoring
    files:
      - dashboards/k8s-views-global.json
      - dashboards/k8s-views-namespaces.json
      - dashboards/k8s-views-nodes.json
      - dashboards/k8s-views-pods.json
      - dashboards/k8s-system-api-server.json
      - dashboards/k8s-system-coredns.json
      - dashboards/logs-explorer.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Kubernetes
  # Synology NAS dashboard (gnetId 14284, bound to VictoriaMetrics) in its own folder.
  - name: synology-dashboard
    namespace: monitoring
    files:
      - dashboards/synology-nas.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Synology
  - name: thor-ai-dashboard
    namespace: monitoring
    files:
      - dashboards/thor-ai.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Thor
  - name: media-stack-dashboard
    namespace: monitoring
    files:
      - dashboards/media-stack.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Media
  - name: home-stack-overview-dashboard
    namespace: monitoring
    files:
      - dashboards/home-stack-overview.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Overview
