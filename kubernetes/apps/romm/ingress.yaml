# Tailscale Ingress -> https://romm.tailc89bc2.ts.net (serve-based; see homepage
# for why L4 expose doesn't work on this Cilium kube-proxy-replacement cluster).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: romm
  namespace: romm
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: romm
      port:
        number: 8080
  tls:
    - hosts:
        - romm
