        3: { value2: START }
        4: { value2: DPAD_UP }
        5: { value2: DPAD_DOWN }
        6: { value2: DPAD_LEFT }
        7: { value2: DPAD_RIGHT }
        10: { value2: LEFT_TOP_SHOULDER }
        11: { value2: RIGHT_TOP_SHOULDER }
        12: { value2: LEFT_BOTTOM_SHOULDER }
        16: { value2: "LEFT_STICK_X:1" }
