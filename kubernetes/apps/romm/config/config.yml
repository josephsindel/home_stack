    ppsspp: &playstation_portable
      0:
        0: { value2: BUTTON_1 }
        1: { value2: BUTTON_3 }
        2: { value2: SELECT }
        3: { value2: START }
        4: { value2: DPAD_UP }
        5: { value2: DPAD_DOWN }
        6: { value2: DPAD_LEFT }
        7: { value2: DPAD_RIGHT }
        8: { value2: BUTTON_2 }
        9: { value2: BUTTON_4 }
        10: { value2: LEFT_TOP_SHOULDER }
        11: { value2: RIGHT_TOP_SHOULDER }
        16: { value2: "LEFT_STICK_X:1" }
        17: { value2: "LEFT_STICK_X:-1" }
        18: { value2: "LEFT_STICK_Y:1" }
        19: { value2: "LEFT_STICK_Y:-1" }
    pcsx_rearmed: *playstation_portable
    mednafen_psx_hw: *playstation_portable
    genesis_plus_gx: &sega_six_button
      0:
        0: { value2: BUTTON_1 }
        1: { value2: BUTTON_3 }
        2: { value2: SELECT }
        3: { value2: START }
        4: { value2: DPAD_UP }
        5: { value2: DPAD_DOWN }
        6: { value2: DPAD_LEFT }
        7: { value2: DPAD_RIGHT }
        8: { value2: BUTTON_2 }
        9: { value2: BUTTON_4 }
        10: { value2: LEFT_TOP_SHOULDER }
        11: { value2: RIGHT_TOP_SHOULDER }
