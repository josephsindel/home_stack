# RomM config (migrated from mediaserver). Omitted sections use RomM defaults.
exclude:
  roms:
    single_file:
      names:
        - ".*"
        - "*.nfo"
        - "*.txt"
        - "*[[]T-*[]]*"
        - "*[[]Hack*[]]*"
        - "*[[]Homebrew*[]]*"
        - "*[[]Proto*[]]*"
        - "*[[]Beta*[]]*"
        - "*[[]Aftermarket*[]]*"
        - "*[[]Unl*[]]*"
        - "*(Proto)*"
        - "*(Beta)*"
        - "*(Homebrew)*"
        - "*(Aftermarket)*"
        - "*(Unl)*"
filesystem:
  roms_folder: roms
emulatorjs:
  controls:
    fceumm: &two_button_nintendo
      0:
        0: { value2: BUTTON_1 }
        2: { value2: SELECT }
        3: { value2: START }
        4: { value2: DPAD_UP }
        5: { value2: DPAD_DOWN }
        6: { value2: DPAD_LEFT }
        7: { value2: DPAD_RIGHT }
        8: { value2: BUTTON_2 }
    nestopia: *two_button_nintendo
    gambatte: *two_button_nintendo
    mednafen_pce: *two_button_nintendo
    smsplus: *two_button_nintendo
    mgba: &four_button_nintendo
      0:
        0: { value2: BUTTON_1 }
        1: { value2: BUTTON_3 }
        2: { value2: SELECT }
        3: { value2: START }
        4: { value2: DPAD_UP }
        5: { value2: DPAD_DOWN }
        6: { value2: DPAD_LEFT }
        7: { value2: DPAD_RIGHT }
        8: { value2: BUTTON_2 }
        9: { value2: BUTTON_4 }
        10: { value2: LEFT_TOP_SHOULDER }
        11: { value2: RIGHT_TOP_SHOULDER }
    snes9x: *four_button_nintendo
    melonds: *four_button_nintendo
    desmume: *four_button_nintendo
