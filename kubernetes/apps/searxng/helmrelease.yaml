apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
  namespace: searxng
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      searxng:
        containers:
          app:
            image:
              repository: docker.io/searxng/searxng
              tag: 2026.5.31-7159b8aed
            env:
              SEARXNG_BASE_URL: http://192.168.86.246/
              SEARXNG_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: searxng-secret
                    key: SEARXNG_SECRET
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /, port: 8080 }
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /, port: 8080 }
                  initialDelaySeconds: 5
                  periodSeconds: 10
    service:
      app:
        controller: searxng
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.86.246"
        ports:
          http:
            port: 80
            targetPort: 8080
