# qBittorrent + gluetun VPN in one pod (shared netns). gluetun establishes the
# Proton WireGuard tunnel + killswitch; qBittorrent inherits it. Cluster pod/service
# CIDRs are in FIREWALL_OUTBOUND_SUBNETS so the killswitch still allows cluster DNS
# and *arr->qbit traffic. FIREWALL_INPUT_PORTS opens the WebUI to the Service/probe.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 1h
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      qbittorrent:
        containers:
          gluetun:
            image:
              repository: qmcgaw/gluetun
              tag: v3.40
            env:
              VPN_SERVICE_PROVIDER: protonvpn
              VPN_TYPE: wireguard
              WIREGUARD_ADDRESSES: 10.2.0.2/32
              SERVER_COUNTRIES: Netherlands
              VPN_PORT_FORWARDING: "on"
              VPN_PORT_FORWARDING_PROVIDER: protonvpn
              DOT: "on"
              FIREWALL_INPUT_PORTS: "8080"
              FIREWALL_OUTBOUND_SUBNETS: "192.168.86.0/24,192.168.20.0/24,192.168.30.0/24,192.168.40.0/24,192.168.50.0/24,10.244.0.0/16,10.96.0.0/12"
              TZ: America/Los_Angeles
              WIREGUARD_PRIVATE_KEY:
                valueFrom:
                  secretKeyRef: { name: gluetun-wg, key: WIREGUARD_PRIVATE_KEY }
            securityContext:
              capabilities:
                add: ["NET_ADMIN"]
          app:
            image:
              repository: ghcr.io/linuxserver/qbittorrent
              tag: latest
            env:
              PUID: "1024"
              PGID: "100"
              TZ: America/Los_Angeles
              WEBUI_PORT: "8080"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8080 }
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8080 }
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  failureThreshold: 12
    service:
      app:
        controller: qbittorrent
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.86.253"
        ports:
          http: { port: 8080, targetPort: 8080 }
    persistence:
      config:
        enabled: true
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 2Gi
        advancedMounts:
          qbittorrent:
            app:
              - path: /config
      incomplete:
        enabled: true
        type: emptyDir        # local scratch (NFS unsuitable for in-progress data)
        advancedMounts:
          qbittorrent:
            app:
              - path: /data/incomplete
      media:
        enabled: true
        existingClaim: media
        advancedMounts:
          qbittorrent:
            app:
              - path: /mnt/nas/content
                subPath: content
      tun:
        enabled: true
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /dev/net/tun
