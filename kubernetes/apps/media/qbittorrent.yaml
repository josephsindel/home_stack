# qBittorrent + gluetun VPN in one pod (shared netns). gluetun establishes the
# Proton WireGuard tunnel + killswitch; qBittorrent inherits it. Cluster pod/service
# CIDRs are in FIREWALL_OUTBOUND_SUBNETS so the killswitch still allows cluster DNS
# and *arr->qbit traffic. FIREWALL_INPUT_PORTS opens the WebUI to the Service/probe.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 1h
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      qbittorrent:
        containers:
          gluetun:
            image:
              repository: qmcgaw/gluetun
              tag: v3.40
            env:
              VPN_SERVICE_PROVIDER: protonvpn
              VPN_TYPE: wireguard
              WIREGUARD_ADDRESSES: 10.2.0.2/32
              SERVER_COUNTRIES: Netherlands
              VPN_PORT_FORWARDING: "on"
              VPN_PORT_FORWARDING_PROVIDER: protonvpn
              # DNS-over-TLS has been causing repeated Gluetun healthcheck
              # restarts under tracker load; use cluster DNS through the VPN
              # namespace instead so qBittorrent does not keep losing PF.
              DOT: "off"
              FIREWALL_INPUT_PORTS: "8080"
              FIREWALL_OUTBOUND_SUBNETS: "192.168.86.0/24,192.168.20.0/24,192.168.30.0/24,192.168.40.0/24,192.168.50.0/24,10.244.0.0/16,10.96.0.0/12"
              TZ: America/Los_Angeles
              WIREGUARD_PRIVATE_KEY:
                valueFrom:
                  secretKeyRef: { name: gluetun-wg, key: WIREGUARD_PRIVATE_KEY }
            securityContext:
              capabilities:
                add: ["NET_ADMIN"]
          app:
            image:
              repository: ghcr.io/linuxserver/qbittorrent
              tag: latest
            env:
              PUID: "1024"
              PGID: "100"
              TZ: America/Los_Angeles
              WEBUI_PORT: "8080"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8080 }
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8080 }
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  failureThreshold: 12
          # Syncs gluetun's Proton-forwarded port -> qBittorrent listen port.
          # Reads the shared port file; sets via the localhost API (auth bypassed).
          # PF watchdog: Proton's NAT-PMP port-forward loop can wedge while the
          # tunnel itself stays healthy (port file empty/0 indefinitely; happened
          # 2026-07-15, sat dead 3 days). If PF is dead for WATCHDOG_TICKS
          # consecutive 10s ticks, bounce the VPN via gluetun's control server
          # (pod netns survives, so qBittorrent keeps running) and force a
          # listen-port resync + reannounce once a port comes back.
          port-sync:
            image:
              repository: curlimages/curl
              tag: latest
            env:
              WATCHDOG_TICKS: "30" # 30 x 10s = 5 min
              CTRL_APIKEY:
                valueFrom:
                  secretKeyRef: { name: gluetun-wg, key: CONTROL_SERVER_APIKEY }
            command: ["/bin/sh", "-c"]
            args:
              - |
                PF_DEAD=0; FORCE=0;
                while true; do
                  P=$(cat /tmp/gluetun/forwarded_port 2>/dev/null | tr -d '[:space:]');
                  if [ -n "$P" ] && [ "$P" != "0" ]; then
                    PF_DEAD=0;
                    cur=$(curl -fs --max-time 5 http://localhost:8080/api/v2/app/preferences 2>/dev/null | sed -n 's/.*"listen_port":\([0-9]*\).*/\1/p');
                    if [ "$P" != "$cur" ] || [ "$FORCE" = "1" ]; then
                      curl -fs --max-time 5 -d "json={\"listen_port\":$P}" http://localhost:8080/api/v2/app/setPreferences >/dev/null 2>&1 \
                        && curl -fs --max-time 8 -d "hashes=all" http://localhost:8080/api/v2/torrents/reannounce >/dev/null 2>&1 \
                        && { echo "synced listen_port=$P"; FORCE=0; };
                    fi;
                  else
                    PF_DEAD=$((PF_DEAD+1));
                    if [ "$PF_DEAD" -ge "${WATCHDOG_TICKS:-30}" ]; then
                      echo "watchdog: PF dead ~$((PF_DEAD*10))s, restarting VPN via control server";
                      curl -fs --max-time 10 -X PUT -H "X-API-Key: $CTRL_APIKEY" -d '{"status":"stopped"}' http://localhost:8000/v1/vpn/status;
                      sleep 5;
                      curl -fs --max-time 10 -X PUT -H "X-API-Key: $CTRL_APIKEY" -d '{"status":"running"}' http://localhost:8000/v1/vpn/status;
                      PF_DEAD=0; FORCE=1;
                      sleep 50;
                    fi;
                  fi;
                  sleep 10;
                done
    service:
      app:
        controller: qbittorrent
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.86.253"
        ports:
          http: { port: 8080, targetPort: 8080 }
    persistence:
      config:
        enabled: true
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 2Gi
        advancedMounts:
          qbittorrent:
            app:
              - path: /config
      incomplete:
        enabled: true
        type: emptyDir        # local scratch (NFS unsuitable for in-progress data)
        advancedMounts:
          qbittorrent:
            app:
              - path: /data/incomplete
      media:
        enabled: true
        existingClaim: media
        advancedMounts:
          qbittorrent:
            app:
              - path: /mnt/nas/content
                subPath: content
      tun:
        enabled: true
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /dev/net/tun
      # Control-server auth (gluetun v3.40+ deprecates unauthenticated routes);
      # role/apikey consumed by the port-sync watchdog.
      gluetun-auth:
        enabled: true
        type: secret
        name: gluetun-wg
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /gluetun/auth/config.toml
                subPath: auth-config.toml
                readOnly: true
      # Shared scratch so port-sync can read gluetun's forwarded_port file.
      gluetun-data:
        enabled: true
        type: emptyDir
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /tmp/gluetun
            port-sync:
              - path: /tmp/gluetun
