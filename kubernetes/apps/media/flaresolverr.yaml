# Stateless Cloudflare solver used internally by Prowlarr (http://flaresolverr:8191).
# ClusterIP only — no LAN exposure needed.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flaresolverr
  namespace: media
spec:
  interval: 1h
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      flaresolverr:
        containers:
          app:
            image:
              repository: ghcr.io/flaresolverr/flaresolverr
              tag: latest
            env:
              TZ: America/Los_Angeles
              LOG_LEVEL: info
            probes:
              liveness: { enabled: true }
              readiness: { enabled: true }
    service:
      app:
        controller: flaresolverr
        ports:
          http: { port: 8191, targetPort: 8191 }
