apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
  namespace: media
spec:
  interval: 1h
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      bazarr:
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/bazarr
              tag: latest
            env:
              PUID: "1024"
              PGID: "100"
              TZ: America/Los_Angeles
            probes:
              # Bazarr indexes the library on startup; relax probes so it isn't
              # killed before its web server binds 6767.
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 6767 }
                  initialDelaySeconds: 120
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 6767 }
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  failureThreshold: 12
    service:
      app:
        controller: bazarr
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.86.251"
        ports:
          http: { port: 6767, targetPort: 6767 }
    persistence:
      config:
        enabled: true
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts: [{ path: /config }]
      media:
        enabled: true
        existingClaim: media
        globalMounts: [{ path: /mnt/nas/content, subPath: content }]
