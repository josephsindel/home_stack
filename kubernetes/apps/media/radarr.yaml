apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 1h
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      radarr:
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/radarr
              tag: latest
            env:
              PUID: "1024"
              PGID: "100"
              TZ: America/Los_Angeles
            probes:
              liveness: { enabled: true }
              readiness: { enabled: true }
    service:
      app:
        controller: radarr
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.86.249"
        ports:
          http: { port: 80, targetPort: 7878 }
    persistence:
      config:
        enabled: true
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts: [{ path: /config }]
      media:
        enabled: true
        existingClaim: media
        globalMounts: [{ path: /mnt/nas/content, subPath: content, readOnly: true }]
