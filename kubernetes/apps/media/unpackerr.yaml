# Extracts completed download archives for Sonarr/Radarr. Stateless (env-driven).
# Most useful once torrents (qBittorrent via gluetun, M4) are running; harmless idle.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpackerr
  namespace: media
spec:
  interval: 1h
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      unpackerr:
        containers:
          app:
            image:
              repository: docker.io/golift/unpackerr
              tag: latest
            env:
              TZ: America/Los_Angeles
              UN_SONARR_0_URL: http://sonarr:8989/sonarr
              UN_RADARR_0_URL: http://radarr:7878/radarr
              UN_SONARR_0_PATHS_0: /mnt/nas/content
              UN_RADARR_0_PATHS_0: /mnt/nas/content
              UN_SONARR_0_API_KEY:
                valueFrom:
                  secretKeyRef: { name: media-arr-keys, key: SONARR_API_KEY }
              UN_RADARR_0_API_KEY:
                valueFrom:
                  secretKeyRef: { name: media-arr-keys, key: RADARR_API_KEY }
        pod:
          # No fsGroup: it triggers a recursive chown of the entire NFS media
          # library. NFS authorizes by numeric uid/gid, so runAsUser/Group suffice.
          securityContext:
            runAsUser: 1024
            runAsGroup: 100
    persistence:
      media:
        enabled: true
        existingClaim: media
        globalMounts: [{ path: /mnt/nas/content, subPath: content }]
